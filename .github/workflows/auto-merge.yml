name: Auto Merge PRs

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted]
  check_suite:
    types: [completed]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup OCaml
        uses: ocaml/setup-ocaml@v2
        with:
          ocaml-compiler: 4.14.x
          dune-cache: true

      - name: Install dependencies
        run: |
          opam install -y dune menhir ocamllex ppx_deriving
          opam install -y alcotest ounit2 bisect_ppx

      - name: Build project
        run: |
          dune build

      - name: Run tests
        run: |
          dune runtest

      - name: Run linter
        run: |
          dune build @fmt --profile=dev || true

      - name: Check if PR should be auto-merged
        id: auto-merge-check
        run: |
          # Check if all CI checks have passed
          if [ "${{ github.event.pull_request.head.sha }}" != "" ]; then
            echo "PR is ready for auto-merge" >> $GITHUB_OUTPUT
            echo "should_merge=true" >> $GITHUB_OUTPUT
          else
            echo "should_merge=false" >> $GITHUB_OUTPUT
          fi

      - name: Auto-merge PR
        if: steps.auto-merge-check.outputs.should_merge == 'true'
        uses: pascalgn/merge-action@v0.15.6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          merge_method: squash
          merge_commit_title: "auto-merge: {pull_request.title} (#{pull_request.number})"
          merge_commit_message: |
            {pull_request.body}
            
            Auto-merged after successful CI checks.
            
            Co-authored-by: {pull_request.user.login} <{pull_request.user.email}>

  continuous-development:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create development PR
        run: |
          # This will be expanded to automatically create new feature PRs
          echo "Continuous development pipeline ready"